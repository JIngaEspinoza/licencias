services:
  # --- BASE DE DATOS ---
  postgres:
    image: postgres:16
    container_name: nest_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"             # expone Postgres en el host
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
        #healthcheck:
      #test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mi_user} -d ${POSTGRES_DB:-mi_db}"]
      #test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
        #interval: 10s
        #timeout: 5s
        #retries: 5

  # --- BACKEND (NESTJS) ---
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nest_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      # Añade aquí otras variables que necesite tu NestJS
    depends_on:
      - postgres
        #condition: service_healthy

  # --- FRONTEND (REACT) ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
