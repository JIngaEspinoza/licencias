services:
  # --- BASE DE DATOS ---
  postgres:
    image: postgres:16
    container_name: nest_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"             # expone Postgres en el host
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  # --- BACKEND (NESTJS) ---
  backend:
    build:
      context: ..
    container_name: nest_backend
    env_file: .env
    volumes:
      - ..:/app
      - /app/node_modules
    ports:
      - "4001:3000"
    command: npm run start:dev
    depends_on:
      - postgres

  # --- FRONTEND (REACT) ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: build
    container_name: react_frontend
    environment:
      - NODE_ENV=development
    volumes: 
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5001:5173"
    command: npm run dev -- --host
